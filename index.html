<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>videos</title>
  <style>
    body {
      margin: 0;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .wrap {
      padding: 16px;
    }
    .title {
      font-size: 20px;
      margin-bottom: 12px;
    }
    .video {
      width: 100%;
      max-width: 720px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 18px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .play {
      width: 0;
      height: 0;
      border-left: 32px solid #fff;
      border-top: 22px solid transparent;
      border-bottom: 22px solid transparent;
      margin-left: 6px;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="title">videos for you</div>

    <div class="video"
      onclick="location.href='https://lite.tiktok.com/t/ZS9eTCgn7myEu-RQnnv/'">
      <div class="play"></div>
    </div>
  </div>

</body>
</html>
